services:
  postgres:
    image: postgres:16-alpine
    container_name: myanimelist-db
    environment:
      POSTGRES_USER: animeuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: anime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myanimelist-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animeuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: MyAnimeList.Backend/Dockerfile
    container_name: myanimelist-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=anime;Username=animeuser;Password=${DB_PASSWORD};"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myanimelist-network
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  myanimelist-network:
    driver: bridge